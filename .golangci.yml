version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gofmt
    - goimports
    - revive
    - gosec
    - misspell
    - unconvert
    - unparam
    - copylock
    - exhaustive
    - noctx
    - bodyclose

linters-settings:
  goimports:
    local-prefixes: github.com/Balr0g404/go-api-skeletton
  revive:
    rules:
      - name: exported
        disabled: true
  gosec:
    excludes:
      - G115

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - unparam
    - path: docs/
      linters:
        - all
    - path: migrations/
      linters:
        - all
